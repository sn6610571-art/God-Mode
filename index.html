<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURELAB V1000000 | UNIVERSAL ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --surface: #0a0e14;
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger: #ff0055;
            --warning: #ffaa00;
            --text: #e6edf3;
            --border: #1a202c;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR ELITE --- */
        aside {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .logo span { color: #fff; }

        .status-card {
            background: rgba(0, 255, 136, 0.03);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 4px;
            font-size: 0.7rem;
            position: relative;
        }

        .status-card::before { content: "SYS-ACTIVE"; position: absolute; top: -10px; right: 10px; background: var(--accent); color: #000; padding: 2px 5px; font-weight: bold; }

        .btn-premium {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }
        .btn-premium:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--accent-glow); }

        /* --- MAIN ENGINE --- */
        main { display: grid; grid-template-rows: 60px 1fr 320px; overflow: hidden; }

        header {
            padding: 0 25px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .traffic-container {
            overflow-y: auto;
            padding: 15px;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .packet {
            background: rgba(10, 14, 20, 0.9);
            border: 1px solid var(--border);
            padding: 12px;
            display: grid;
            grid-template-columns: 80px 80px 1fr 120px;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .packet:hover { border-color: var(--accent); background: #111821; }
        .packet.active { border-left: 4px solid var(--accent); background: #111821; }

        .method { font-weight: bold; text-align: center; border-radius: 2px; padding: 2px; }
        .GET { color: var(--accent); background: rgba(0, 255, 136, 0.1); }
        .POST { color: var(--info); background: rgba(0, 180, 216, 0.1); }

        /* --- REWRITE INTERFACE --- */
        .rewrite-hub {
            background: #05070a;
            border-top: 2px solid var(--accent);
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .panel { padding: 20px; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .panel-header { font-size: 0.7rem; color: var(--accent); margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
        
        .code-editor {
            flex: 1;
            background: #000;
            color: #d29922;
            padding: 15px;
            font-size: 0.8rem;
            overflow-y: auto;
            border: 1px solid #111;
            outline: none;
            white-space: pre;
        }

        .btn-action {
            margin-top: 10px;
            background: #fff;
            color: #000;
            border: none;
            padding: 8px;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<aside>
    <div class="logo">SECURE<span>LAB</span></div>
    
    <div class="status-card">
        ENGINE: <strong>V1000000-UNIV</strong><br>

    <section class="rewrite-hub">

            stream.prepend(div);

</script>

</html>
