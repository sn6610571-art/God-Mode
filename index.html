<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VYZ ENGINE | GOD-MODE 1000000</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #080a0c; --bg-panel: #111418; --bg-header: #010204;
            --accent: #39ff14; --cyan: #00ffff; --danger: #ff3366; --border: #262c34;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-main); color: #c9d1d9;
            height: 100vh; display: grid; grid-template-rows: 60px 1fr; grid-template-columns: 280px 1fr 400px;
        }

        /* HEADER */
        header {
            grid-column: 1 / -1; background: var(--bg-header); border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }
        .brand { font-weight: 900; font-size: 1.4rem; color: #fff; text-transform: uppercase; }
        .brand span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* STATUS INDICATOR */
        .status-badge { display: flex; align-items: center; gap: 8px; font-family: 'Fira Code'; font-size: 0.8rem; }
        .dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* SIDEBAR & TABLES */
        aside { background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; }
        .tree-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .tree-item:hover { background: #1c2128; color: var(--accent); }

        main { overflow-y: auto; background: var(--bg-main); }
        .data-table { width: 100%; border-collapse: collapse; font-family: 'Fira Code'; font-size: 0.8rem; }
        .data-table th { background: var(--bg-header); padding: 12px; text-align: left; color: #8b949e; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--border); transition: 0.1s; }
        .data-table tr:hover td { background: rgba(57, 255, 20, 0.05); cursor: crosshair; }

        /* INSPECTOR */
        .inspector { background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; background: var(--bg-header); }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.8rem; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(57, 255, 20, 0.05); }

        .editor-container { flex: 1; background: #000; padding: 15px; }
        textarea.code-editor {
            width: 100%; height: 100%; background: transparent; border: none; color: var(--cyan);
            font-family: 'Fira Code'; font-size: 0.9rem; outline: none; resize: none;
        }

        /* BUTTONS */
        .btn { padding: 8px 16px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-panel); color: #fff; font-weight: 600; font-size: 0.75rem; }
        .btn-action { background: var(--accent); color: #000; border: none; }
        .btn-action:hover { background: #32d615; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="brand">GOD-MODE<span> ENGINE</span></div>
    <div class="status-badge"><div class="dot"></div> ENGINE ACTIVE (BRIDGE ONLINE)</div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" onclick="clearLogs()">CLEAR LOGS</button>
        <button class="btn btn-action" onclick="toggleIntercept()">INTERCEPT: ON</button>
    </div>
</header>

<aside id="target-tree">
    <div style="padding: 15px; font-size: 0.7rem; color: var(--accent); font-weight: bold;">DISCOVERED ENDPOINTS</div>
    </aside>

<main>
    <table class="data-table">
        <thead>
            <tr>
                <th>TIME</th>
                <th>METHOD</th>
                <th>URL</th>
                <th>STATUS</th>
                <th>SIZE</th>
            </tr>
        </thead>
        <tbody id="traffic-body">
            </tbody>
    </table>
</main>

<div class="inspector">
    <div class="tabs">
        <div class="tab active">RESPONSE PAYLOAD</div>
        <div class="tab">HEADERS</div>
        <div class="tab">PROTOBUF HEX</div>
    </div>
    <div class="editor-container">
        <textarea id="editor" class="code-editor" spellcheck="false">// Select a request to inspect...</textarea>
    </div>
    <div style="padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;">
        <button class="btn btn-action" onclick="injectPatch()">⚡ APPLY LINE PATCH (GOD-MODE)</button>
        <button class="btn" style="color: var(--danger); border-color: var(--danger);" onclick="dropPacket()">DROP PACKET</button>
    </div>
</div>

<script>
    const trafficBody = document.getElementById('traffic-body');
    const editor = document.getElementById('editor');

    // Conexão real com o Bridge.py
    const ws = new WebSocket('ws://localhost:8765');

    ws.onmessage = (event) => {
        const req = JSON.parse(event.data);
        addRequestToTable(req);
    };

    function addRequestToTable(req) {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${new Date().toLocaleTimeString()}</td>
            <td style="color:${req.method === 'POST' ? '#e3b341' : '#00ffff'}">${req.method}</td>
            <td style="max-width:300px; overflow:hidden; text-overflow:ellipsis;">${req.url}</td>
            <td style="color:var(--accent)">200 OK</td>
            <td>${req.size}b</td>
        `;
        row.onclick = () => {
            editor.value = JSON.stringify(req.body, null, 4);
        };
        trafficBody.prepend(row);
    }

    function clearLogs() { trafficBody.innerHTML = ''; editor.value = '// Logs cleared.'; }
    
    function injectPatch() {
        alert("PATCH INJECTED: O motor bridge.py agora está forçando este payload no classes.dex!");
        // Aqui você enviaria o novo JSON de volta via WS para o bridge.py salvar
    }
</script>
</body>
    </html>
