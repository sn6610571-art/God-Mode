<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYZ FIGHTER | REWRITE ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0c10; --bg-panel: #12151c; --accent: #39ff14; 
            --cyan: #00ffff; --danger: #ff3366; --border: #232933;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-main); color: #c9d1d9;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* RESPONSIVE GRID PC/MOBILE */
        .app-container {
            display: grid; flex: 1;
            grid-template-columns: 260px 1fr 420px;
        }
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; grid-template-rows: 200px 1fr 300px; }
            aside { display: none; } /* Oculta árvore no mobile p/ foco */
        }

        header {
            height: 60px; background: #010204; border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            z-index: 100;
        }

        .brand { font-weight: 900; color: #fff; letter-spacing: 2px; font-size: 1.2rem; }
        .brand span { color: var(--accent); text-shadow: 0 0 12px var(--accent); }

        /* SIDEBAR (TREE) */
        aside { background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; }
        .tree-node { font-family: 'Fira Code'; font-size: 0.75rem; padding: 8px; border-radius: 4px; cursor: pointer; border-bottom: 1px solid #1a1f26; }
        .tree-node:hover { background: #1c222d; color: var(--accent); }

        /* TRAFFIC TABLE */
        main { background: var(--bg-main); overflow-y: auto; border-right: 1px solid var(--border); }
        .data-table { width: 100%; border-collapse: collapse; font-family: 'Fira Code'; font-size: 0.8rem; }
        .data-table th { background: #0d1117; padding: 12px; text-align: left; color: #8b949e; position: sticky; top: 0; }
        .data-table td { padding: 10px; border-bottom: 1px solid var(--border); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .data-table tr.selected { background: rgba(57, 255, 20, 0.1) !important; border-left: 3px solid var(--accent); }

        /* INSPECTOR & EDITOR */
        .inspector { background: var(--bg-panel); display: flex; flex-direction: column; height: 100%; }
        .tabs { display: flex; background: #010204; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; color: #8b949e; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #11141b; }

        .editor-box { flex: 1; background: #000; padding: 10px; position: relative; }
        textarea.code-editor {
            width: 100%; height: 100%; background: transparent; border: none; color: var(--cyan);
            font-family: 'Fira Code'; font-size: 0.85rem; outline: none; resize: none;
        }

        .actions { padding: 15px; background: #0d1117; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 0.75rem; transition: 0.3s; }
        .btn-patch { background: var(--accent); color: #000; }
        .btn-patch:hover { box-shadow: 0 0 15px var(--accent); }
        .btn-clear { background: #1c222d; color: #fff; }
    </style>
</head>
<body>

<header>
    <div class="brand">VYZ <span>FIGHTER</span> 1.0</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="status-dot" style="width:12px; height:12px; background:gray; border-radius:50%"></div>
        <button class="btn btn-clear" onclick="clearLogs()">CLEAR</button>
    </div>
</header>

<div class="app-container">
    <aside id="tree-view">
        <div style="color:var(--accent); font-size:0.7rem; margin-bottom:10px; font-weight:bold">ROOT PROJECT TREE</div>
        <div class="tree-node">📂 classes.dex (ACTIVE)</div>
        <div class="tree-node">📂 endpoints/betnacional</div>
    </aside>

    <main>
        <table class="data-table">
            <thead>
                <tr>
                    <th>METHOD</th>
                    <th>PATH</th>
                    <th>SIZE</th>
                </tr>
            </thead>
            <tbody id="traffic-list"></tbody>
        </table>
    </main>

    <div class="inspector">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('res')">RESPONSE</div>
            <div class="tab" onclick="switchTab('req')">REQUEST</div>
            <div class="tab" onclick="switchTab('head')">HEADERS</div>
        </div>
        <div class="editor-box">
            <textarea id="main-editor" class="code-editor" spellcheck="false">// Select a flow...</textarea>
        </div>
        <div class="actions">
            <button class="btn btn-patch" onclick="applyRewrite()">⚡ APPLY REWRITE (GOD-MODE)</button>
        </div>
    </div>
</div>

<script>
    let currentFlows = {};
    let selectedId = null;
    const ws = new WebSocket('ws://localhost:8765');
    const dot = document.getElementById('status-dot');

    ws.onopen = () => dot.style.background = 'var(--accent)';
    ws.onclose = () => dot.style.background = 'var(--danger)';

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.type === "TRAFFIC") {
            currentFlows[data.id] = { req: data, res: null };
            renderRow(data);
        } else if (data.type === "RESPONSE") {
            if (currentFlows[data.id]) currentFlows[data.id].res = data;
        }
    };

    function renderRow(req) {
        const tbody = document.getElementById('traffic-list');
        const row = document.createElement('tr');
        row.id = `flow-${req.id}`;
        row.innerHTML = `
            <td style="color:${req.method === 'POST' ? '#e3b341' : '#00ffff'}">${req.method}</td>
            <td>${req.url.split('/').pop() || '/'}</td>
            <td>${req.size}b</td>
        `;
        row.onclick = () => selectFlow(req.id);
        tbody.prepend(row);
    }

    function selectFlow(id) {
        selectedId = id;
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        document.getElementById(`flow-${id}`).classList.add('selected');
        const flow = currentFlows[id];
        document.getElementById('main-editor').value = flow.res ? flow.res.body : "// Waiting for response...";
    }

    function applyRewrite() {
        if (!selectedId) return alert("Selecione um tráfego primeiro!");
        const editedBody = document.getElementById('main-editor').value;
        const patch = {
            type: "PATCH_APPLY",
            url: currentFlows[selectedId].req.url,
            new_body: editedBody
        };
        ws.send(json.stringify(patch));
        alert("🚀 REWRITE ENVIADO! O bridge.py agora forçará esta resposta no app.");
    }

    function clearLogs() {
        document.getElementById('traffic-list').innerHTML = '';
        currentFlows = {};
        document.getElementById('main-editor').value = '';
    }
</script>
</body>
</html>
